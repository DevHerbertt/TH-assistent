spring.application.name=TH-brain

# Desabilita Docker Compose na subida da aplicação (evita erro se o Docker Desktop não estiver rodando)
spring.docker.compose.enabled=false

# Modelo Ollama (troque por um mais capaz: llama3.1:8b, qwen2.5:7b, mistral, mixtral, etc.)
ollama.model=llama3.1
ollama.base-url=http://localhost:11434

# Modelo Ollama (mais esperto: qwen2.5:7b | qwen2.5:14b | llama3.1:8b | mistral | phi3:medium)
# Antes de usar: ollama pull <modelo>
ollama.model=llama3.1
